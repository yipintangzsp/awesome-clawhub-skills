name: Desktop Release

on:
  push:
    tags:
      - "v*"
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (for example: v0.2.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          desktop_version=$(node -e 'const fs = require("node:fs"); const pkg = JSON.parse(fs.readFileSync("apps/desktop/package.json", "utf8")); process.stdout.write(pkg.version);')
          expected_tag="v${desktop_version}"
          legacy_expected_tag="desktop-v${desktop_version}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag_name="${{ inputs.tag_name }}"
          else
            tag_name="${GITHUB_REF#refs/tags/}"
          fi

          if [ "$tag_name" != "$expected_tag" ] && [ "$tag_name" != "$legacy_expected_tag" ]; then
            echo "Expected desktop release tag $expected_tag (legacy: $legacy_expected_tag) but received $tag_name" >&2
            exit 1
          fi

          if [[ "$desktop_version" == *-* ]]; then
            prerelease=true
          else
            prerelease=false
          fi

          if [ "$prerelease" = "true" ]; then
            channel="beta"
          else
            channel="stable"
          fi

          commit_sha=$(git rev-parse HEAD)

          {
            echo "desktop_version=$desktop_version"
            echo "tag_name=$tag_name"
            echo "release_name=v$desktop_version"
            echo "prerelease=$prerelease"
            echo "channel=$channel"
            echo "commit_sha=$commit_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare Apple signing certificate
        shell: bash
        env:
          APPLE_SIGNING_CERTIFICATE_BASE64: ${{ secrets.APPLE_SIGNING_CERTIFICATE_BASE64 }}
          APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "$APPLE_SIGNING_CERTIFICATE_BASE64" ] || [ -z "$APPLE_SIGNING_CERTIFICATE_PASSWORD" ]; then
            echo "Missing Apple signing certificate secrets" >&2
            exit 1
          fi

          cert_path="$RUNNER_TEMP/nexu-desktop-signing.p12"
          if ! printf '%s' "$APPLE_SIGNING_CERTIFICATE_BASE64" | base64 --decode > "$cert_path" 2>/dev/null; then
            printf '%s' "$APPLE_SIGNING_CERTIFICATE_BASE64" | base64 -D > "$cert_path"
          fi

          {
            echo "CSC_LINK=$cert_path"
            echo "CSC_KEY_PASSWORD=$APPLE_SIGNING_CERTIFICATE_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate build config
        shell: bash
        env:
          CHANNEL: ${{ steps.meta.outputs.channel }}
          SENTRY_ENV: "prod"
          BUILD_COMMIT: ${{ steps.meta.outputs.commit_sha }}
          SENTRY_DSN_TEST: ${{ secrets.SENTRY_DSN_NEXU_DESKTOP_TEST }}
          SENTRY_DSN_PROD: ${{ secrets.SENTRY_DSN_NEXU_DESKTOP_PROD }}
        run: |
          export BUILT_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          node -e '
            const { version } = require("./apps/desktop/package.json");
            const sentryDsnByEnvironment = {
              test: process.env.SENTRY_DSN_TEST,
              prod: process.env.SENTRY_DSN_PROD,
            };
            const sentryDsn = sentryDsnByEnvironment[process.env.SENTRY_ENV] ?? "";
            const config = {
              NEXU_CLOUD_URL: "https://nexu.io",
              NEXU_LINK_URL: "https://link.nexu.io",
              NEXU_SENTRY_ENV: process.env.SENTRY_ENV,
              NEXU_UPDATE_FEED_URL: `https://desktop-releases.nexu.io/${process.env.CHANNEL}`,
              NEXU_DESKTOP_APP_VERSION: version,
              NEXU_DESKTOP_BUILD_SOURCE: "release",
              NEXU_DESKTOP_BUILD_BRANCH: "",
              NEXU_DESKTOP_BUILD_COMMIT: process.env.BUILD_COMMIT,
              NEXU_DESKTOP_BUILD_TIME: process.env.BUILT_AT,
            };
            if (sentryDsn) {
              config.NEXU_DESKTOP_SENTRY_DSN = sentryDsn;
            }
            require("fs").writeFileSync(
              "apps/desktop/build-config.json",
              JSON.stringify(config, null, 2) + "\n"
            );
          '

          echo "[build] Generated build-config.json for release:"
          cat apps/desktop/build-config.json

      - name: Build signed desktop release
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: pnpm --filter @nexu/desktop dist:mac

      - name: Prepare release artifacts
        id: artifacts
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.desktop_version }}
          CHANNEL: ${{ steps.meta.outputs.channel }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          channel="$CHANNEL"

          mkdir -p apps/desktop/release-artifacts
          rm -f apps/desktop/release-artifacts/*

          dmg_files=(apps/desktop/release/*.dmg)
          zip_files=(apps/desktop/release/*.zip)

          if [ "${#dmg_files[@]}" -eq 0 ] || [ "${#zip_files[@]}" -eq 0 ]; then
            echo "No desktop release artifacts were produced" >&2
            exit 1
          fi

          # New naming: nexu-{version}-{channel}-{arch}.{ext}
          versioned_dmg="nexu-${VERSION}-${channel}-arm64.dmg"
          versioned_zip="nexu-${VERSION}-${channel}-arm64.zip"
          latest_dmg="nexu-latest-${channel}-arm64.dmg"
          latest_zip="nexu-latest-${channel}-arm64.zip"

          cp "${dmg_files[0]}" "apps/desktop/release-artifacts/${versioned_dmg}"
          cp "${zip_files[0]}" "apps/desktop/release-artifacts/${versioned_zip}"
          cp "${dmg_files[0]}" "apps/desktop/release-artifacts/${latest_dmg}"
          cp "${zip_files[0]}" "apps/desktop/release-artifacts/${latest_zip}"

          shasum -a 256 \
            "apps/desktop/release-artifacts/${versioned_dmg}" \
            "apps/desktop/release-artifacts/${versioned_zip}" \
            > apps/desktop/release-artifacts/desktop-sha256.txt

          {
            echo "channel=$channel"
            echo "versioned_dmg=$versioned_dmg"
            echo "versioned_zip=$versioned_zip"
            echo "latest_dmg=$latest_dmg"
            echo "latest_zip=$latest_zip"
          } >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-${{ steps.meta.outputs.tag_name }}
          path: |
            apps/desktop/release-artifacts/*.dmg
            apps/desktop/release-artifacts/*.zip
            apps/desktop/release-artifacts/desktop-sha256.txt
          if-no-files-found: error

      - name: Check whether GitHub release already exists
        id: release_check
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft GitHub release
        if: steps.release_check.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          target_commitish: ${{ steps.meta.outputs.commit_sha }}
          name: ${{ steps.meta.outputs.release_name }}
          draft: true
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          overwrite_files: true
          fail_on_unmatched_files: true
          body: |
            Desktop release for `${{ steps.meta.outputs.desktop_version }}`.

            Assets include signed macOS `.dmg` and `.zip` packages plus `desktop-sha256.txt`.

            The packaged `Nexu.app` bundle is notarized and stapled during the build before the archives are published.
          files: |
            apps/desktop/release-artifacts/${{ steps.artifacts.outputs.versioned_dmg }}
            apps/desktop/release-artifacts/${{ steps.artifacts.outputs.versioned_zip }}
            apps/desktop/release-artifacts/desktop-sha256.txt

      - name: Upload assets to existing GitHub release
        if: steps.release_check.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail

          gh release upload "$TAG_NAME" \
            "apps/desktop/release-artifacts/${{ steps.artifacts.outputs.versioned_dmg }}" \
            "apps/desktop/release-artifacts/${{ steps.artifacts.outputs.versioned_zip }}" \
            "apps/desktop/release-artifacts/desktop-sha256.txt" \
            --clobber

      - name: Patch latest-mac.yml for channel naming
        env:
          VERSION: ${{ steps.meta.outputs.desktop_version }}
          CHANNEL: ${{ steps.artifacts.outputs.channel }}
          VERSIONED_DMG: ${{ steps.artifacts.outputs.versioned_dmg }}
          VERSIONED_ZIP: ${{ steps.artifacts.outputs.versioned_zip }}
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "apps/desktop/release/latest-mac.yml" ]; then
            echo "latest-mac.yml not found, skipping patch"
            exit 0
          fi

          # electron-builder generates filenames without channel, we need to patch them
          original_dmg="nexu-${VERSION}-arm64.dmg"
          original_zip="nexu-${VERSION}-arm64.zip"

          echo "Patching latest-mac.yml:"
          echo "  ${original_dmg} → ${VERSIONED_DMG}"
          echo "  ${original_zip} → ${VERSIONED_ZIP}"

          sed -i.bak \
            -e "s|${original_dmg}|${VERSIONED_DMG}|g" \
            -e "s|${original_zip}|${VERSIONED_ZIP}|g" \
            apps/desktop/release/latest-mac.yml

          echo "Patched latest-mac.yml:"
          cat apps/desktop/release/latest-mac.yml

      - name: Upload to Cloudflare R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CHANNEL: ${{ steps.artifacts.outputs.channel }}
          VERSIONED_DMG: ${{ steps.artifacts.outputs.versioned_dmg }}
          VERSIONED_ZIP: ${{ steps.artifacts.outputs.versioned_zip }}
          LATEST_DMG: ${{ steps.artifacts.outputs.latest_dmg }}
          LATEST_ZIP: ${{ steps.artifacts.outputs.latest_zip }}
        run: |
          set -euo pipefail

          echo "[r2] uploading to prefix: ${CHANNEL}/"

          # Upload patched latest-mac.yml for auto-update
          if [ -f "apps/desktop/release/latest-mac.yml" ]; then
            echo "Uploading latest-mac.yml → ${CHANNEL}/latest-mac.yml"
            npx wrangler r2 object put "nexu-desktop-releases/${CHANNEL}/latest-mac.yml" --file "apps/desktop/release/latest-mac.yml" --remote
          fi

          # Upload versioned artifacts
          echo "Uploading ${VERSIONED_DMG} → ${CHANNEL}/${VERSIONED_DMG}"
          npx wrangler r2 object put "nexu-desktop-releases/${CHANNEL}/${VERSIONED_DMG}" --file "apps/desktop/release-artifacts/${VERSIONED_DMG}" --remote

          echo "Uploading ${VERSIONED_ZIP} → ${CHANNEL}/${VERSIONED_ZIP}"
          npx wrangler r2 object put "nexu-desktop-releases/${CHANNEL}/${VERSIONED_ZIP}" --file "apps/desktop/release-artifacts/${VERSIONED_ZIP}" --remote

          # Upload latest artifacts (overwrite each time)
          echo "Uploading ${LATEST_DMG} → ${CHANNEL}/${LATEST_DMG}"
          npx wrangler r2 object put "nexu-desktop-releases/${CHANNEL}/${LATEST_DMG}" --file "apps/desktop/release-artifacts/${LATEST_DMG}" --remote

          echo "Uploading ${LATEST_ZIP} → ${CHANNEL}/${LATEST_ZIP}"
          npx wrangler r2 object put "nexu-desktop-releases/${CHANNEL}/${LATEST_ZIP}" --file "apps/desktop/release-artifacts/${LATEST_ZIP}" --remote

          # Upload checksum
          echo "Uploading desktop-sha256.txt → ${CHANNEL}/desktop-sha256.txt"
          npx wrangler r2 object put "nexu-desktop-releases/${CHANNEL}/desktop-sha256.txt" --file "apps/desktop/release-artifacts/desktop-sha256.txt" --remote
