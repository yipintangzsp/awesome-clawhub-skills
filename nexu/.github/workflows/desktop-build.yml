name: Desktop Build (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment name"
        required: true
        type: string
      cloud_url:
        description: "NEXU_CLOUD_URL value"
        required: true
        type: string
      link_url:
        description: "NEXU_LINK_URL value (use 'null' for no link)"
        required: false
        type: string
        default: "null"
      sentry_env:
        description: "NEXU_SENTRY_ENV value (test, prod)"
        required: true
        type: string
      release_tag:
        description: "GitHub release tag name"
        required: true
        type: string
      release_name:
        description: "GitHub release display name"
        required: true
        type: string
      update_feed_url:
        description: "NEXU_UPDATE_FEED_URL for auto-update (R2 path)"
        required: false
        type: string
        default: ""
      channel:
        description: "Release channel (stable, beta, nightly)"
        required: true
        type: string
      build_source:
        description: "Build source label embedded in desktop metadata"
        required: true
        type: string
    secrets:
      CLOUDFLARE_ZONE_ID:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate channel input
        shell: bash
        run: |
          case "${{ inputs.channel }}" in
            stable|beta|nightly) ;;
            *) echo "Invalid channel: ${{ inputs.channel }}" >&2; exit 1 ;;
          esac

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Resolve build metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          base_version=$(node -e 'const fs = require("node:fs"); const pkg = JSON.parse(fs.readFileSync("apps/desktop/package.json", "utf8")); process.stdout.write(pkg.version);')
          build_date=$(date +"%Y%m%d")
          short_sha="${GITHUB_SHA::7}"
          channel="${{ inputs.channel }}"

          # For non-stable channels, inject date suffix into version for auto-update
          # e.g. 0.1.1 → 0.1.1-nightly.20260319 (only in build artifact, not committed to git)
          if [ "$channel" != "stable" ]; then
            desktop_version="${base_version}-${channel}.${build_date}"
            node -e "
              const fs = require('node:fs');
              const path = 'apps/desktop/package.json';
              const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
              pkg.version = '${desktop_version}';
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
            "
            echo "[meta] Patched version: ${base_version} → ${desktop_version}"
          else
            desktop_version="$base_version"
          fi

          {
            echo "desktop_version=$desktop_version"
            echo "build_date=$build_date"
            echo "short_sha=$short_sha"
            echo "channel=$channel"
            echo "artifact_name=desktop-${channel}-${build_date}-${short_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare Apple signing certificate
        shell: bash
        env:
          APPLE_SIGNING_CERTIFICATE_BASE64: ${{ secrets.APPLE_SIGNING_CERTIFICATE_BASE64 }}
          APPLE_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "$APPLE_SIGNING_CERTIFICATE_BASE64" ] || [ -z "$APPLE_SIGNING_CERTIFICATE_PASSWORD" ]; then
            echo "Missing Apple signing certificate secrets" >&2
            exit 1
          fi

          cert_path="$RUNNER_TEMP/nexu-desktop-signing.p12"
          if ! printf '%s' "$APPLE_SIGNING_CERTIFICATE_BASE64" | base64 --decode > "$cert_path" 2>/dev/null; then
            printf '%s' "$APPLE_SIGNING_CERTIFICATE_BASE64" | base64 -D > "$cert_path"
          fi

          {
            echo "CSC_LINK=$cert_path"
            echo "CSC_KEY_PASSWORD=$APPLE_SIGNING_CERTIFICATE_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate build config
        shell: bash
        env:
          CLOUD_URL: ${{ inputs.cloud_url }}
          LINK_URL: ${{ inputs.link_url }}
          SENTRY_ENV: ${{ inputs.sentry_env }}
          UPDATE_FEED_URL: ${{ inputs.update_feed_url }}
          BUILD_SOURCE: ${{ inputs.build_source }}
          BUILD_BRANCH: ${{ github.ref_name }}
          BUILD_COMMIT: ${{ github.sha }}
          SENTRY_DSN_TEST: ${{ secrets.SENTRY_DSN_NEXU_DESKTOP_TEST }}
          SENTRY_DSN_PROD: ${{ secrets.SENTRY_DSN_NEXU_DESKTOP_PROD }}
        run: |
          export BUILT_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          node -e '
            const { version } = require("./apps/desktop/package.json");
            const sentryDsnByEnvironment = {
              test: process.env.SENTRY_DSN_TEST,
              prod: process.env.SENTRY_DSN_PROD,
            };
            const sentryDsn = sentryDsnByEnvironment[process.env.SENTRY_ENV] ?? "";
            const config = {
              NEXU_CLOUD_URL: process.env.CLOUD_URL,
              NEXU_LINK_URL: process.env.LINK_URL === "null" ? null : process.env.LINK_URL,
              NEXU_SENTRY_ENV: process.env.SENTRY_ENV,
              NEXU_DESKTOP_APP_VERSION: version,
              NEXU_DESKTOP_UPDATE_CHANNEL: "${{ inputs.channel }}",
              NEXU_DESKTOP_BUILD_SOURCE: process.env.BUILD_SOURCE,
              NEXU_DESKTOP_BUILD_BRANCH: process.env.BUILD_BRANCH,
              NEXU_DESKTOP_BUILD_COMMIT: process.env.BUILD_COMMIT,
              NEXU_DESKTOP_BUILD_TIME: process.env.BUILT_AT,
            };
            if (process.env.UPDATE_FEED_URL) {
              config.NEXU_UPDATE_FEED_URL = process.env.UPDATE_FEED_URL;
            }
            if (sentryDsn) {
              config.NEXU_DESKTOP_SENTRY_DSN = sentryDsn;
            }
            require("fs").writeFileSync(
              "apps/desktop/build-config.json",
              JSON.stringify(config, null, 2) + "\n"
            );
          '

          echo "[build] Generated build-config.json for ${{ inputs.environment }} environment:"
          cat apps/desktop/build-config.json

      - name: Build signed desktop app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: pnpm --filter @nexu/desktop dist:mac

      - name: Prepare artifacts
        id: artifacts
        shell: bash
        env:
          CHANNEL: ${{ inputs.channel }}
          VERSION: ${{ steps.meta.outputs.desktop_version }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p apps/desktop/channel-artifacts
          rm -f apps/desktop/channel-artifacts/*

          dmg_files=(apps/desktop/release/*.dmg)
          zip_files=(apps/desktop/release/*.zip)

          if [ "${#dmg_files[@]}" -eq 0 ] || [ "${#zip_files[@]}" -eq 0 ]; then
            echo "Expected both dmg and zip artifacts in apps/desktop/release" >&2
            exit 1
          fi

          # New naming: nexu-{version}-{channel}-{arch}.{ext}
          versioned_dmg="nexu-${VERSION}-${CHANNEL}-arm64.dmg"
          versioned_zip="nexu-${VERSION}-${CHANNEL}-arm64.zip"
          latest_dmg="nexu-latest-${CHANNEL}-arm64.dmg"
          latest_zip="nexu-latest-${CHANNEL}-arm64.zip"

          cp "${dmg_files[0]}" "apps/desktop/channel-artifacts/${versioned_dmg}"
          cp "${zip_files[0]}" "apps/desktop/channel-artifacts/${versioned_zip}"
          cp "${dmg_files[0]}" "apps/desktop/channel-artifacts/${latest_dmg}"
          cp "${zip_files[0]}" "apps/desktop/channel-artifacts/${latest_zip}"

          shasum -a 256 \
            "apps/desktop/channel-artifacts/${versioned_dmg}" \
            "apps/desktop/channel-artifacts/${versioned_zip}" \
            > apps/desktop/channel-artifacts/desktop-sha256.txt

          {
            echo "versioned_dmg=$versioned_dmg"
            echo "versioned_zip=$versioned_zip"
            echo "latest_dmg=$latest_dmg"
            echo "latest_zip=$latest_zip"
          } >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: |
            apps/desktop/channel-artifacts/${{ steps.artifacts.outputs.versioned_dmg }}
            apps/desktop/channel-artifacts/${{ steps.artifacts.outputs.versioned_zip }}
            apps/desktop/channel-artifacts/desktop-sha256.txt
          retention-days: 7
          if-no-files-found: error

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ inputs.release_name }}
          prerelease: true
          draft: false
          overwrite_files: true
          fail_on_unmatched_files: true
          body: |
            Automated desktop build.

            - Version: `${{ steps.meta.outputs.desktop_version }}`
            - Channel: `${{ inputs.channel }}`
            - Environment: `${{ inputs.environment }}`
            - Commit: `${{ github.sha }}`
            - Built: `${{ steps.meta.outputs.build_date }}`

            The packaged `Nexu.app` bundle is notarized and stapled.

            This build is intended for testing and may be unstable.
          files: |
            apps/desktop/channel-artifacts/${{ steps.artifacts.outputs.versioned_dmg }}
            apps/desktop/channel-artifacts/${{ steps.artifacts.outputs.versioned_zip }}
            apps/desktop/channel-artifacts/desktop-sha256.txt

      - name: Patch latest-mac.yml for channel naming
        if: inputs.update_feed_url != ''
        env:
          VERSION: ${{ steps.meta.outputs.desktop_version }}
          CHANNEL: ${{ inputs.channel }}
          VERSIONED_DMG: ${{ steps.artifacts.outputs.versioned_dmg }}
          VERSIONED_ZIP: ${{ steps.artifacts.outputs.versioned_zip }}
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "apps/desktop/release/latest-mac.yml" ]; then
            echo "latest-mac.yml not found, skipping patch"
            exit 0
          fi

          # electron-builder generates filenames without channel, we need to patch them
          # Original: nexu-0.1.3-arm64.dmg
          # Target:   nexu-0.1.3-nightly-arm64.dmg
          original_dmg="nexu-${VERSION}-arm64.dmg"
          original_zip="nexu-${VERSION}-arm64.zip"

          echo "Patching latest-mac.yml:"
          echo "  ${original_dmg} → ${VERSIONED_DMG}"
          echo "  ${original_zip} → ${VERSIONED_ZIP}"

          sed -i.bak \
            -e "s|${original_dmg}|${VERSIONED_DMG}|g" \
            -e "s|${original_zip}|${VERSIONED_ZIP}|g" \
            apps/desktop/release/latest-mac.yml

          echo "Patched latest-mac.yml:"
          cat apps/desktop/release/latest-mac.yml

      - name: Upload to Cloudflare R2
        if: inputs.update_feed_url != ''
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          UPDATE_FEED_URL: ${{ inputs.update_feed_url }}
          CHANNEL: ${{ inputs.channel }}
          VERSIONED_DMG: ${{ steps.artifacts.outputs.versioned_dmg }}
          VERSIONED_ZIP: ${{ steps.artifacts.outputs.versioned_zip }}
          LATEST_DMG: ${{ steps.artifacts.outputs.latest_dmg }}
          LATEST_ZIP: ${{ steps.artifacts.outputs.latest_zip }}
        shell: bash
        run: |
          set -euo pipefail

          # Extract R2 prefix from feed URL path (e.g. https://desktop-releases.nexu.io/nightly → nightly)
          r2_prefix=$(node -e "process.stdout.write(new URL(process.env.UPDATE_FEED_URL).pathname.slice(1))")

          echo "[r2] uploading to prefix: ${r2_prefix}/"

          # Upload patched latest-mac.yml for auto-update
          if [ -f "apps/desktop/release/latest-mac.yml" ]; then
            echo "Uploading latest-mac.yml → ${r2_prefix}/latest-mac.yml"
            npx wrangler r2 object put "nexu-desktop-releases/${r2_prefix}/latest-mac.yml" --file "apps/desktop/release/latest-mac.yml" --remote
          fi

          # Upload versioned artifacts
          echo "Uploading ${VERSIONED_DMG} → ${r2_prefix}/${VERSIONED_DMG}"
          npx wrangler r2 object put "nexu-desktop-releases/${r2_prefix}/${VERSIONED_DMG}" --file "apps/desktop/channel-artifacts/${VERSIONED_DMG}" --remote

          echo "Uploading ${VERSIONED_ZIP} → ${r2_prefix}/${VERSIONED_ZIP}"
          npx wrangler r2 object put "nexu-desktop-releases/${r2_prefix}/${VERSIONED_ZIP}" --file "apps/desktop/channel-artifacts/${VERSIONED_ZIP}" --remote

          # Upload latest artifacts (overwrite each time)
          echo "Uploading ${LATEST_DMG} → ${r2_prefix}/${LATEST_DMG}"
          npx wrangler r2 object put "nexu-desktop-releases/${r2_prefix}/${LATEST_DMG}" --file "apps/desktop/channel-artifacts/${LATEST_DMG}" --remote

          echo "Uploading ${LATEST_ZIP} → ${r2_prefix}/${LATEST_ZIP}"
          npx wrangler r2 object put "nexu-desktop-releases/${r2_prefix}/${LATEST_ZIP}" --file "apps/desktop/channel-artifacts/${LATEST_ZIP}" --remote

          # Upload checksum
          echo "Uploading desktop-sha256.txt → ${r2_prefix}/desktop-sha256.txt"
          npx wrangler r2 object put "nexu-desktop-releases/${r2_prefix}/desktop-sha256.txt" --file "apps/desktop/channel-artifacts/desktop-sha256.txt" --remote

      - name: Purge Cloudflare CDN cache for latest artifacts
        if: inputs.update_feed_url != '' && env.CLOUDFLARE_ZONE_ID != ''
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          UPDATE_FEED_URL: ${{ inputs.update_feed_url }}
          LATEST_DMG: ${{ steps.artifacts.outputs.latest_dmg }}
          LATEST_ZIP: ${{ steps.artifacts.outputs.latest_zip }}
        shell: bash
        run: |
          set -euo pipefail

          base_url="${UPDATE_FEED_URL%/}"
          urls=(
            "${base_url}/${LATEST_DMG}"
            "${base_url}/${LATEST_ZIP}"
            "${base_url}/latest-mac.yml"
          )

          files_json=$(printf '%s\n' "${urls[@]}" | jq -R . | jq -sc '.')
          echo "[cf-purge] Purging: ${files_json}"

          curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"files\": ${files_json}}" \
            | jq .

      - name: Publish Cloudflare download links
        if: inputs.update_feed_url != ''
        env:
          UPDATE_FEED_URL: ${{ inputs.update_feed_url }}
          VERSIONED_DMG: ${{ steps.artifacts.outputs.versioned_dmg }}
          VERSIONED_ZIP: ${{ steps.artifacts.outputs.versioned_zip }}
          LATEST_DMG: ${{ steps.artifacts.outputs.latest_dmg }}
          LATEST_ZIP: ${{ steps.artifacts.outputs.latest_zip }}
        shell: bash
        run: |
          set -euo pipefail

          base_url="${UPDATE_FEED_URL%/}"
          latest_yml_url="${base_url}/latest-mac.yml"
          versioned_dmg_url="${base_url}/${VERSIONED_DMG}"
          versioned_zip_url="${base_url}/${VERSIONED_ZIP}"
          latest_dmg_url="${base_url}/${LATEST_DMG}"
          latest_zip_url="${base_url}/${LATEST_ZIP}"

          {
            echo "## Cloudflare Downloads"
            echo
            echo "### Versioned"
            echo "- DMG: ${versioned_dmg_url}"
            echo "- ZIP: ${versioned_zip_url}"
            echo
            echo "### Latest (always current)"
            echo "- DMG: ${latest_dmg_url}"
            echo "- ZIP: ${latest_zip_url}"
            echo
            echo "- Update feed: ${latest_yml_url}"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Cloudflare Versioned DMG: ${versioned_dmg_url}"
          echo "Cloudflare Latest DMG: ${latest_dmg_url}"
          echo "Cloudflare update feed: ${latest_yml_url}"

  cleanup-artifacts:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Delete old artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PREFIX: desktop-${{ inputs.channel }}
        run: |
          set -euo pipefail

          cutoff_date=$(date -d "14 days ago" +%Y-%m-%d)

          gh api "repos/$REPO/actions/artifacts" --paginate | \
            jq -r '.artifacts[] | select(.name | startswith("'"$PREFIX"'")) | select(.created_at < "'"$cutoff_date"'") | .id' | \
            while read -r artifact_id; do
              if [ -n "$artifact_id" ]; then
                gh api "repos/$REPO/actions/artifacts/$artifact_id" -X DELETE
              fi
            done
