name: Feature Request
description: Suggest a new feature or capability.
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve Nexu? Describe it below.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? Why is it needed?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or behavior you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Which part of Nexu does this relate to?
      multiple: true
      options:
        - Desktop app (Electron shell)
        - Controller (backend / API)
        - Web dashboard (React UI)
        - OpenClaw runtime
        - Skills
        - Shared schemas / packages
        - Build / CI / Tooling
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, screenshots, links to related issues, or anything else.
