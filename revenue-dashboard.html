<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillPay 收入追踪仪表板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #333;
            font-size: 28px;
        }
        
        .last-update {
            color: #666;
            font-size: 14px;
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        .refresh-btn:hover {
            background: #5568d3;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-card .value {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-card .sub-value {
            font-size: 14px;
            color: #999;
            margin-top: 5px;
        }
        
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .chart-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .chart-card h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 18px;
        }
        
        .table-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .table-card h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 18px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        th {
            background: #f8f9fa;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .skill-name {
            font-weight: 600;
            color: #333;
        }
        
        .revenue-positive {
            color: #10b981;
            font-weight: 600;
        }
        
        .progress-bar {
            background: #e9ecef;
            border-radius: 10px;
            height: 20px;
            margin-top: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }
        
        .auto-refresh-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .error {
            background: #fee;
            color: #c00;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        @media (max-width: 768px) {
            .charts-row {
                grid-template-columns: 1fr;
            }
            
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>📊 SkillPay 收入追踪仪表板</h1>
                <p class="last-update">
                    <span class="auto-refresh-indicator"></span>
                    最后更新：<span id="lastUpdate">加载中...</span>
                    <span id="nextRefresh" style="margin-left: 10px; color: #999;"></span>
                </p>
            </div>
            <button class="refresh-btn" onclick="loadData()">🔄 手动刷新</button>
        </div>
        
        <div id="loading" class="loading">
            <h2>🔄 正在加载数据...</h2>
        </div>
        
        <div id="error" class="error" style="display: none;"></div>
        
        <div id="content" style="display: none;">
            <!-- 统计卡片 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>今日收入</h3>
                    <div class="value" id="todayRevenue">¥0</div>
                    <div class="sub-value" id="todayDownloads">0 次下载</div>
                </div>
                <div class="stat-card">
                    <h3>本周收入</h3>
                    <div class="value" id="weekRevenue">¥0</div>
                    <div class="sub-value" id="weekDownloads">0 次下载</div>
                </div>
                <div class="stat-card">
                    <h3>本月收入</h3>
                    <div class="value" id="monthRevenue">¥0</div>
                    <div class="sub-value" id="monthDownloads">0 次下载</div>
                </div>
                <div class="stat-card">
                    <h3>平均单价</h3>
                    <div class="value" id="avgPrice">¥0</div>
                    <div class="sub-value">每下载</div>
                </div>
            </div>
            
            <!-- 图表行 -->
            <div class="charts-row">
                <div class="chart-card">
                    <h3>📈 Skill 收入分布</h3>
                    <canvas id="skillChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>📊 Skill 下载量对比</h3>
                    <canvas id="downloadChart"></canvas>
                </div>
            </div>
            
            <!-- 收入明细表 -->
            <div class="table-card">
                <h3>💰 今日收入明细</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Skill 名称</th>
                            <th>下载量</th>
                            <th>收入</th>
                            <th>单价</th>
                        </tr>
                    </thead>
                    <tbody id="revenueTable">
                    </tbody>
                </table>
            </div>
            
            <!-- 进度条 -->
            <div class="table-card">
                <h3>🎯 月度目标进度</h3>
                <div style="margin-top: 15px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                        <span>当前收入：<strong id="currentMonth">¥0</strong></span>
                        <span>目标：<strong>¥5,000</strong></span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                    <p style="text-align: right; margin-top: 5px; color: #666;" id="progressText">0%</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let skillChart = null;
        let downloadChart = null;
        let refreshTimer = null;
        let countdownTimer = null;
        const REFRESH_INTERVAL = 5 * 60 * 1000; // 5 分钟
        const MONTH_TARGET = 5000;
        
        // 解析 markdown 表格
        function parseTable(markdown) {
            const lines = markdown.split('\n').filter(line => line.trim());
            const table = [];
            let headers = [];
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.startsWith('|') && line.endsWith('|')) {
                    const cells = line.split('|').slice(1, -1).map(cell => cell.trim());
                    if (cells.some(cell => cell.includes('---'))) {
                        continue; // 跳过分割线
                    }
                    if (headers.length === 0) {
                        headers = cells;
                    } else {
                        const row = {};
                        headers.forEach((header, idx) => {
                            row[header] = cells[idx] || '';
                        });
                        table.push(row);
                    }
                }
            }
            
            return table;
        }
        
        // 提取数字
        function extractNumber(str) {
            if (!str) return 0;
            const match = str.match(/[\d,]+/);
            return match ? parseInt(match[0].replace(/,/g, '')) : 0;
        }
        
        // 提取收入（带¥符号）
        function extractRevenue(str) {
            if (!str) return 0;
            const match = str.match(/¥?([\d,]+)/);
            return match ? parseInt(match[1].replace(/,/g, '')) : 0;
        }
        
        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('revenue-today.md');
                if (!response.ok) {
                    throw new Error('无法加载 revenue-today.md 文件');
                }
                const markdown = await response.text();
                processData(markdown);
                updateTimestamp();
            } catch (error) {
                showError(error.message);
            }
        }
        
        // 处理数据
        function processData(markdown) {
            const lines = markdown.split('\n');
            let currentSection = '';
            const todaySkills = [];
            let todayTotal = 0;
            let todayDownloads = 0;
            
            // 解析今日收入表格
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                if (line.includes('## 💰 今日收入')) {
                    currentSection = 'today';
                    continue;
                }
                if (line.includes('## 📈 累计收入')) {
                    currentSection = 'cumulative';
                    continue;
                }
                if (line.includes('##')) {
                    currentSection = '';
                    continue;
                }
                
                if (currentSection === 'today' && line.startsWith('|') && !line.includes('---')) {
                    const cells = line.split('|').slice(1, -1).map(cell => cell.trim());
                    if (cells.length >= 3 && !cells[0].includes('Skill') && !cells[0].includes('合计')) {
                        const skill = cells[0];
                        const downloads = extractNumber(cells[1]);
                        const revenue = extractRevenue(cells[2]);
                        todaySkills.push({ skill, downloads, revenue });
                        todayTotal += revenue;
                        todayDownloads += downloads;
                    }
                }
            }
            
            // 更新统计卡片
            document.getElementById('todayRevenue').textContent = '¥' + todayTotal.toLocaleString();
            document.getElementById('todayDownloads').textContent = todayDownloads + ' 次下载';
            
            // 估算本周和本月（基于今日数据）
            const weekEstimate = todayTotal * 7;
            const monthEstimate = todayTotal * 30;
            document.getElementById('weekRevenue').textContent = '¥' + weekEstimate.toLocaleString();
            document.getElementById('weekDownloads').textContent = (todayDownloads * 7) + ' 次下载';
            document.getElementById('monthRevenue').textContent = '¥' + monthEstimate.toLocaleString();
            document.getElementById('monthDownloads').textContent = (todayDownloads * 30) + ' 次下载';
            
            // 计算平均单价
            const avgPrice = todayDownloads > 0 ? (todayTotal / todayDownloads).toFixed(2) : 0;
            document.getElementById('avgPrice').textContent = '¥' + avgPrice;
            
            // 更新表格
            const tbody = document.getElementById('revenueTable');
            tbody.innerHTML = '';
            todaySkills.forEach(item => {
                const unitPrice = item.downloads > 0 ? (item.revenue / item.downloads).toFixed(2) : 0;
                const row = `
                    <tr>
                        <td class="skill-name">${item.skill}</td>
                        <td>${item.downloads}</td>
                        <td class="revenue-positive">¥${item.revenue}</td>
                        <td>¥${unitPrice}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
            
            // 添加合计行
            tbody.innerHTML += `
                <tr style="background: #f8f9fa; font-weight: bold;">
                    <td>合计</td>
                    <td>${todayDownloads}</td>
                    <td class="revenue-positive">¥${todayTotal}</td>
                    <td>¥${avgPrice}</td>
                </tr>
            `;
            
            // 更新进度条
            const progress = Math.min((todayTotal / MONTH_TARGET) * 100, 100);
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = progress.toFixed(1) + '%';
            document.getElementById('currentMonth').textContent = '¥' + todayTotal.toLocaleString();
            
            // 更新图表
            updateCharts(todaySkills);
            
            // 显示内容
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
        }
        
        // 更新图表
        function updateCharts(skills) {
            const ctx1 = document.getElementById('skillChart').getContext('2d');
            const ctx2 = document.getElementById('downloadChart').getContext('2d');
            
            // 销毁旧图表
            if (skillChart) skillChart.destroy();
            if (downloadChart) downloadChart.destroy();
            
            // 收入分布图（饼图）
            skillChart = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: skills.map(s => s.skill),
                    datasets: [{
                        data: skills.map(s => s.revenue),
                        backgroundColor: [
                            '#667eea', '#764ba2', '#f093fb', '#f5576c',
                            '#4facfe', '#00f2fe', '#43e97b', '#38f9d7', '#fa709a'
                        ],
                        borderWidth: 2,
                        borderColor: '#fff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                boxWidth: 12,
                                font: { size: 11 }
                            }
                        }
                    }
                }
            });
            
            // 下载量对比图（柱状图）
            downloadChart = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: skills.map(s => s.skill),
                    datasets: [{
                        label: '下载量',
                        data: skills.map(s => s.downloads),
                        backgroundColor: 'rgba(102, 126, 234, 0.8)',
                        borderColor: 'rgba(102, 126, 234, 1)',
                        borderWidth: 1,
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                stepSize: 1
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });
        }
        
        // 更新时间戳
        function updateTimestamp() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('lastUpdate').textContent = timeStr;
        }
        
        // 显示错误
        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = '❌ ' + message;
            errorDiv.style.display = 'block';
        }
        
        // 倒计时显示
        function startCountdown() {
            let secondsLeft = Math.floor(REFRESH_INTERVAL / 1000);
            
            function update() {
                const minutes = Math.floor(secondsLeft / 60);
                const seconds = secondsLeft % 60;
                document.getElementById('nextRefresh').textContent = 
                    `下次刷新：${minutes}分${seconds.toString().padStart(2, '0')}秒`;
                
                if (secondsLeft > 0) {
                    secondsLeft--;
                } else {
                    secondsLeft = Math.floor(REFRESH_INTERVAL / 1000);
                }
            }
            
            update();
            if (countdownTimer) clearInterval(countdownTimer);
            countdownTimer = setInterval(update, 1000);
        }
        
        // 自动刷新
        function startAutoRefresh() {
            if (refreshTimer) clearInterval(refreshTimer);
            refreshTimer = setInterval(loadData, REFRESH_INTERVAL);
            startCountdown();
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            startAutoRefresh();
        });
    </script>
</body>
</html>
